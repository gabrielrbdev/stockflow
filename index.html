<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockFlow | Controle de Recebimento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ══ HEADER ══════════════════════════════════════════ -->
    <header class="winthor-header text-white p-3 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <span class="font-black tracking-tighter text-lg italic">
                STOCKFLOW <span class="font-light text-xs opacity-70 not-italic">| PRO</span>
            </span>
            <div id="nav-abas" class="hidden flex gap-0.5 ml-6">
                <button onclick="switchTab('Dash')"        id="btnAbaDash"        class="tab-active px-5 py-2 font-bold text-[11px] uppercase">Dashboard</button>
                <button onclick="switchTab('Conferencia')" id="btnAbaConferencia" class="hover:bg-white/10 px-5 py-2 font-bold text-[11px] uppercase">Conferência</button>
                <button onclick="switchTab('Fiscal')"      id="btnAbaFiscal"      class="hover:bg-white/10 px-5 py-2 font-bold text-[11px] uppercase">Fiscal</button>
                <button onclick="switchTab('Logs')"        id="btnAbaLogs"        class="hidden hover:bg-white/10 px-5 py-2 font-bold text-[11px] uppercase">Logs</button>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <span id="user-display" class="text-[10px] font-bold uppercase border-r pr-3 border-white/20"></span>
            <button id="btnGerenciarUsuarios" onclick="abrirModalUsuarios()"
                class="hidden btn-header-icon" title="Gerenciar Usuários">
                <i class="ti ti-users"></i>
            </button>
            <button id="btnLogout" class="bg-rose-800 px-3 py-1 text-[10px] font-bold uppercase">Sair</button>
        </div>
    </header>

    <!-- ══ LOGIN ════════════════════════════════════════════ -->
    <div id="auth-screen" class="fixed inset-0 bg-slate-200 flex items-center justify-center z-[300]">
        <div class="winthor-card p-10 w-96 space-y-6 text-center">
            <h1 class="text-2xl font-black text-blue-900 uppercase">Login</h1>
            <input type="email"    id="login-email" placeholder="E-mail" class="w-full">
            <input type="password" id="login-pass"  placeholder="Senha"  class="w-full">
            <button id="btnLogin" class="w-full btn-primary-win py-3 font-black uppercase text-xs">Entrar</button>
        </div>
    </div>

    <!-- ══ CONTEÚDO PRINCIPAL ══════════════════════════════ -->
    <main id="app-content" class="hidden p-4 space-y-4">

        <!-- DASHBOARD -->
        <section id="aba-dash" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                <div class="winthor-card p-4 border-l-4 border-l-blue-800">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Itens em Estoque</p>
                    <div id="kpi-total-itens" class="text-3xl font-black">0</div>
                </div>
                <div class="winthor-card p-4 border-l-4 border-l-amber-600">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Na Conferência</p>
                    <div id="kpi-pendentes" class="text-3xl font-black">0</div>
                </div>
                <div class="winthor-card p-4 border-l-4 border-l-rose-700">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Bloqueados Auditoria</p>
                    <div id="kpi-divergencias" class="text-3xl font-black">0</div>
                </div>
            </div>
            <div id="grid-estoque-fornecedor" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </section>

        <!-- CONFERÊNCIA -->
        <section id="aba-conferencia" class="hidden space-y-4">
            <div id="box-import-xml" class="hidden winthor-card p-4 flex justify-between items-center bg-slate-50 border-dashed border-2">
                <span class="font-bold uppercase text-xs">Importar Nova NF-e (.xml)</span>
                <input type="file" id="xml-input" accept=".xml" class="hidden">
                <button onclick="document.getElementById('xml-input').click()"
                    class="btn-primary-win px-6 py-2 uppercase font-bold text-xs">Processar Arquivo</button>
            </div>
            <div id="list-conferencia" class="space-y-4"></div>
        </section>

        <!-- FISCAL -->
        <section id="aba-fiscal" class="hidden space-y-2">
            <div class="winthor-card overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="winthor-table-header">
                        <tr>
                            <th class="p-2">Lote</th>
                            <th class="p-2">Fornecedor</th>
                            <th class="p-2">Produto</th>
                            <th class="p-2">Tentativas</th>
                            <th class="p-2">Status</th>
                            <th class="p-2 text-center">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="list-fiscal-body" class="text-[11px] uppercase"></tbody>
                </table>
            </div>
        </section>

        <!-- LOGS -->
        <section id="aba-logs" class="hidden winthor-card p-0 overflow-hidden">
            <div class="winthor-table-header bg-slate-800">Monitor de Sistema</div>
            <div id="list-logs" class="bg-[#0f172a] text-emerald-400 font-mono text-[11px] p-5 h-[500px] overflow-y-auto"></div>
        </section>

    </main>

    <!-- ══ MODAL CONFERÊNCIA ════════════════════════════════ -->
    <div id="modal-conferencia" class="hidden fixed inset-0 bg-black/60 z-[400] flex items-center justify-center p-4">
        <div class="winthor-card w-full max-w-sm p-0 overflow-hidden">
            <div class="winthor-table-header p-3">Conferência de Item</div>
            <div class="p-6 space-y-5">
                <h2 id="modal-prod-nome" class="text-sm font-black uppercase text-slate-800"></h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500">QTD. CONTADA</label>
                        <input type="number" id="input-qtd" class="w-full text-xl font-black text-center">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500">VENCIMENTO</label>
                        <input type="date" id="input-validade" class="w-full text-xs">
                    </div>
                </div>
                <div class="flex gap-2 pt-4 border-t">
                    <button onclick="fecharModal()" class="flex-1 btn-winthor py-2">Sair</button>
                    <button id="btnConfirmar"       class="flex-1 btn-primary-win py-2 font-black">GRAVAR</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ══ MODAL USUÁRIOS ══════════════════════════════════ -->
    <div id="modal-usuarios" role="dialog" aria-modal="true" aria-labelledby="mu-titulo">
        <div class="mu-box">
            <div class="mu-header">
                <span id="mu-titulo">
                    <i class="ti ti-users" style="margin-right:6px;vertical-align:-2px"></i>Gerenciar Usuários
                </span>
                <button class="mu-close" onclick="fecharModalUsuarios()">✕</button>
            </div>
            <div class="mu-body">
                <div class="mu-tabs">
                    <button class="mu-tab active" id="mu-tab-novo"   onclick="muSwitchTab('novo')">Novo Usuário</button>
                    <button class="mu-tab"        id="mu-tab-lista"  onclick="muSwitchTab('lista')">Cadastrados</button>
                </div>

                <!-- Painel: Novo Usuário -->
                <div id="mu-pane-novo">
                    <div id="mu-alert" class="mu-alert"></div>
                    <label class="mu-label">E-mail</label>
                    <input type="email"    id="mu-email" class="mu-input" placeholder="usuario@empresa.com">
                    <label class="mu-label">Senha</label>
                    <input type="password" id="mu-senha" class="mu-input" placeholder="Mínimo 6 caracteres">
                    <label class="mu-label" style="margin-top:14px">Perfil de Acesso</label>
                    <div class="role-grid">
                        <div class="role-opt selected" id="role-opt-user"  onclick="muSelectRole('user')">
                            <i class="ti ti-user"></i><span class="rl">Conferente</span>
                        </div>
                        <div class="role-opt"          id="role-opt-admin" onclick="muSelectRole('admin')">
                            <i class="ti ti-shield-check"></i><span class="rl">Admin</span>
                        </div>
                    </div>
                    <button id="mu-btn-salvar" onclick="muCadastrar()"
                        class="w-full btn-primary-win py-2 font-black text-xs uppercase mt-4">
                        Cadastrar Usuário
                    </button>
                </div>

                <!-- Painel: Lista -->
                <div id="mu-pane-lista" style="display:none">
                    <div id="mu-lista-container"></div>
                    <p id="list-usuarios-empty" class="hidden">Nenhum usuário encontrado.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ══ SCRIPTS (ES Modules) ════════════════════════════ -->
    <script type="module" src="js/app.js"></script>

</body>
</html>
